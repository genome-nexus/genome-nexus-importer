version: 2.1
jobs:
  build_and_publish_grch37:
    docker:
      - image: cimg/go:1.17
    resource_class: large 
    steps:
      - checkout
      # steps for building/testing app
      - run:
          name: Get Git tag
          command: |
            git fetch --tags
            echo 'export GIT_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) | sed 's/^v//g')' >> "$BASH_ENV"
            source "$BASH_ENV"
      - setup_remote_docker:
          docker_layer_caching: true
      # build and push Docker image
      - run:
          name: Login to Docker Hub
          command: echo ${DOCKER_PASSWORD} | docker login -u ${DOCKER_USERNAME} --password-stdin
      - run:
          name: Set up QEMU and buildx for multi-platform builds
          command: |
            docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
            docker buildx create --use --name multiarch
            docker buildx inspect --bootstrap
      - run:
          name: Build and push multi-platform image
          command: |
            TAG=${GIT_TAG}
            IMAGE=genomenexus/gn-mongo
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg ARG_REF_ENSEMBL_VERSION=grch37_ensembl111 \
              -t $IMAGE:$TAG \
              --push \
              .
  
